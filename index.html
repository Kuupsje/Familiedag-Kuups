<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Familiedag Kas</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sun: #FFD93D;
    --coral: #FF6B6B;
    --mint: #6BCB77;
    --sky: #4D96FF;
    --lavender: #C77DFF;
    --peach: #FFA552;
    --cream: #FFF8EE;
    --dark: #2D2D2D;
    --card: #FFFFFF;
    --shadow: 0 4px 20px rgba(0,0,0,0.10);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Confetti bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 10% 20%, #FFD93D33 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #FF6B6B22 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #6BCB7711 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; position: relative; z-index: 1; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0d6e6e 0%, #1a9490 50%, #2db8b0 100%);
    padding: 28px 20px 36px;
    text-align: center;
    border-radius: 0 0 32px 32px;
    box-shadow: 0 6px 24px rgba(13,110,110,0.35);
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '🎉 🎊 🎈 🎉 🎊 🎈';
    position: absolute;
    bottom: -4px;
    left: 0; right: 0;
    font-size: 20px;
    letter-spacing: 6px;
    opacity: 0.3;
  }
  .header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: white;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.15);
    letter-spacing: 1px;
  }
  .header p { color: rgba(255,255,255,0.9); font-size: 0.9rem; font-weight: 600; margin-top: 4px; }

  /* Totaal balk */
  .totals-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 16px 14px;
  }
  .total-card {
    background: white;
    border-radius: 16px;
    padding: 12px 8px;
    text-align: center;
    box-shadow: var(--shadow);
    border-top: 4px solid var(--sun);
  }
  .total-card.coral { border-color: var(--coral); }
  .total-card.mint  { border-color: var(--mint); }
  .total-card .amount {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: var(--dark);
  }
  .total-card .label {
    font-size: 0.65rem;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 0 14px 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 8px 18px;
    border-radius: 99px;
    border: 2px solid #E0E0E0;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: #888;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--sky);
    border-color: var(--sky);
    color: white;
    box-shadow: 0 4px 12px rgba(77,150,255,0.35);
  }

  /* Sections */
  .section { display: none; padding: 0 14px; }
  .section.active { display: block; }

  /* Cards */
  .card {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    position: relative;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.05rem;
    color: var(--dark);
  }
  .badge {
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.3px;
  }
  .badge-sun { background: #FFF3CD; color: #B8860B; }
  .badge-mint { background: #D4EDDA; color: #256029; }
  .badge-sky { background: #D1ECF1; color: #0C5460; }
  .badge-coral { background: #FDECEA; color: #991B1B; }

  /* Familielid rij */
  .member-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed #F0E8D8;
  }
  .member-row:last-child { border-bottom: none; padding-bottom: 0; }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }
  .member-info { flex: 1; }
  .member-name { font-weight: 800; font-size: 0.95rem; color: var(--dark); }
  .member-age { font-size: 0.75rem; color: #888; font-weight: 600; }
  .member-amount {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
  }
  .amount-gratis { color: #AAA; font-size: 0.85rem; font-weight: 700; }

  /* Bijdrage voortgang */
  .progress-wrap { margin-top: 6px; }
  .progress-bar-bg {
    height: 8px;
    background: #F0E8D8;
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--mint), var(--sky));
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 0.7rem; color: #888; margin-top: 3px; font-weight: 600; }

  /* Inleg rijen */
  .payment-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px dashed #F0E8D8;
  }
  .payment-row:last-child { border-bottom: none; }
  .payment-who { font-weight: 700; font-size: 0.9rem; color: var(--dark); }
  .payment-date { font-size: 0.72rem; color: #AAA; }
  .payment-amount { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--mint); }

  /* Declaratie rijen */
  .decl-row {
    padding: 10px 0;
    border-bottom: 1px dashed #F0E8D8;
  }
  .decl-row:last-child { border-bottom: none; }
  .decl-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .decl-name { font-weight: 800; font-size: 0.9rem; color: var(--dark); }
  .decl-what { font-size: 0.78rem; color: #666; margin-top: 1px; }
  .decl-right { text-align: right; }
  .decl-amount { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--coral); }
  .decl-status { font-size: 0.7rem; font-weight: 700; }
  .paid-out { color: var(--mint); }
  .pending { color: var(--peach); }

  /* Sectie kop */
  .section-heading {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--dark);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--coral), var(--peach));
    color: white;
    font-size: 1.8rem;
    border: none;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,107,107,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s;
    z-index: 100;
  }
  .fab:active { transform: scale(0.93); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 28px 28px 0 0;
    padding: 24px 20px 36px;
    width: 100%; max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.28s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(80px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    margin-bottom: 16px;
    color: var(--dark);
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 800;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }
  .form-group input, .form-group select {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #E8E8E8;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
    background: #FAFAFA;
  }
  .form-group input:focus, .form-group select:focus {
    border-color: var(--sky);
    background: white;
  }
  .btn-primary {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--sky), var(--lavender));
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    margin-top: 4px;
    box-shadow: 0 4px 16px rgba(77,150,255,0.3);
  }
  .btn-secondary {
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: 2px solid #E8E8E8;
    background: white;
    color: #888;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    margin-top: 8px;
  }

  /* Beheerder toggle */
  .admin-bar {
    background: white;
    border-radius: 14px;
    padding: 10px 14px;
    margin: 0 14px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--lavender);
  }
  .admin-bar span { font-weight: 700; font-size: 0.85rem; color: #666; }
  .toggle-btn {
    padding: 6px 14px;
    border-radius: 99px;
    border: none;
    background: var(--lavender);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .toggle-btn.off { background: #E0E0E0; color: #888; }

  /* delete btn */
  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    opacity: 0.3;
    padding: 4px;
    transition: opacity 0.2s;
  }
  .delete-btn:hover { opacity: 0.8; }
  .admin-only { display: none; }
  body.admin-mode .admin-only { display: inline-flex; }

  /* Uitbetaald toggle */
  .paid-toggle {
    background: none;
    border: 1px solid currentColor;
    border-radius: 99px;
    padding: 2px 10px;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .paid-toggle.pending-btn { color: var(--peach); }
  .paid-toggle.paid-btn { color: var(--mint); }

  /* Lege staat */
  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: #BBB;
  }
  .empty-state .emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }
  .empty-state p { font-weight: 700; font-size: 0.9rem; }

  /* PIN modal */
  .pin-dots {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 16px 0;
  }
  .pin-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #E0E0E0;
    transition: background 0.15s;
  }
  .pin-dot.filled { background: var(--lavender); }
  .pin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 8px;
  }
  .pin-key {
    padding: 16px;
    border-radius: 14px;
    border: 2px solid #E8E8E8;
    background: white;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .pin-key:active { background: var(--lavender); color: white; border-color: var(--lavender); }
  .pin-error { color: var(--coral); text-align: center; font-weight: 700; font-size: 0.85rem; }
</style>
</head>

  leden: [],
  inleg: [],
  declaraties: [],
  beginSaldo: 0,
  nextId: 100,
  isAdmin: false,
  activeTab: 'leden',
};

// ==================== HELPERS ====================
function berekenLeeftijd(geboortedatum) {
  if (!geboortedatum) return 0;
  const geb = new Date(geboortedatum);
  const nu = new Date();
  let leeftijd = nu.getFullYear() - geb.getFullYear();
  const mndVerschil = nu.getMonth() - geb.getMonth();
  if (mndVerschil < 0 || (mndVerschil === 0 && nu.getDate() < geb.getDate())) leeftijd--;
  return Math.max(0, leeftijd);
}

function volgendVerjaardag(geboortedatum) {
  if (!geboortedatum) return null;
  const geb = new Date(geboortedatum);
  const nu = new Date();
  let verjaardag = new Date(nu.getFullYear(), geb.getMonth(), geb.getDate());
  if (verjaardag <= nu) verjaardag.setFullYear(nu.getFullYear() + 1);
  return verjaardag;
}

function volgendeCategorieDatum(geboortedatum) {
  // Wanneer gaat het tarief omhoog? (4e of 16e verjaardag)
  if (!geboortedatum) return null;
  const leeftijd = berekenLeeftijd(geboortedatum);
  if (leeftijd >= 16) return null; // Al hoogste tarief
  const geb = new Date(geboortedatum);
  const nu = new Date();
  const doelLeeftijd = leeftijd < 4 ? 4 : 16;
  const jaar = geb.getFullYear() + doelLeeftijd;
  const datum = new Date(jaar, geb.getMonth(), geb.getDate());
  if (datum <= nu) return null;
  return datum;
}

function maandBijdrage(geboortedatum) {
  const leeftijd = berekenLeeftijd(geboortedatum);
  if (leeftijd < 4) return 0;
  if (leeftijd < 16) return 2;
  return 4;
}

function getLid(id) { return state.leden.find(l => l.id === id); }

function formatEuro(n) { return '€' + n.toFixed(0).replace('.', ','); }

function formatDatum(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric' });
}

function colorForId(id) { return COLORS[id % COLORS.length]; }

// ==================== RENDER ====================
function renderAlles() {
  renderTotals();
  renderLeden();
  renderInleg();
  renderDeclaraties();
}

function render() {
  if (isLoading) return; // niet renderen én opslaan tijdens laden
  renderAlles();
  slaOp();
}

function renderTotals() {
  const totInleg = state.inleg.reduce((s, i) => s + i.bedrag, 0);
  const totDecl = state.declaraties.reduce((s, d) => s + d.bedrag, 0);
  const totKas = state.beginSaldo + totInleg - totDecl;
  document.getElementById('tot-inleg').textContent = formatEuro(state.beginSaldo + totInleg);
  document.getElementById('tot-decl').textContent = formatEuro(totDecl);
  document.getElementById('tot-kas').textContent = formatEuro(totKas);
  document.getElementById('beginsaldo-toon').textContent = formatEuro(state.beginSaldo);
}

function renderLeden() {
  const el = document.getElementById('leden-list');
  if (!state.leden.length) {
    el.innerHTML = emptyState('👨‍👩‍👧‍👦', 'Nog geen familieleden — log in als beheerder en tik op +');
    return;
  }
  el.innerHTML = state.leden.map(lid => {
    const leeftijd = berekenLeeftijd(lid.geboortedatum);
    const bijdr = maandBijdrage(lid.geboortedatum);
    const totIngelegd = state.inleg.filter(i => i.ledId === lid.id).reduce((s, i) => s + i.bedrag, 0);
    const verwacht = bijdr * 6;
    const pct = verwacht > 0 ? Math.min(100, Math.round(totIngelegd / verwacht * 100)) : 0;
    const catDatum = volgendeCategorieDatum(lid.geboortedatum);
    const catTip = catDatum ? `<div style="font-size:0.68rem;color:#C77DFF;margin-top:2px">🎂 tarief ↑ op ${formatDatum(catDatum.toISOString().slice(0,10))}</div>` : '';
    return `
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="avatar" style="background:${colorForId(lid.id)}22">${lid.emoji}</div>
        <div style="flex:1">
          <div class="member-name">${lid.naam}</div>
          <div class="member-age">${leeftijd} jaar · ${formatDatum(lid.geboortedatum)}</div>
          ${catTip}
          ${bijdr > 0 ? `
          <div class="progress-wrap">
            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
            <div class="progress-label">€${totIngelegd} ingelegd · €${bijdr}/mnd</div>
          </div>` : ''}
        </div>
        <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          ${bijdr > 0
            ? `<span class="member-amount" style="color:${colorForId(lid.id)}">${formatEuro(bijdr)}<span style="font-size:0.65rem;color:#aaa">/mnd</span></span>`
            : `<span class="amount-gratis">Gratis</span>`}
          <button class="delete-btn admin-only" onclick="deleteLid(${lid.id})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderInleg() {
  const el = document.getElementById('inleg-list');
  if (!state.inleg.length) {
    el.innerHTML = emptyState('💰', 'Nog geen inleg geregistreerd');
    return;
  }
  // Groepeer per lid
  const byLid = {};
  state.inleg.forEach(i => {
    if (!byLid[i.ledId]) byLid[i.ledId] = [];
    byLid[i.ledId].push(i);
  });
  let html = '';
  for (const ledId in byLid) {
    const lid = getLid(parseInt(ledId));
    if (!lid) continue;
    const items = byLid[ledId];
    const totaal = items.reduce((s, i) => s + i.bedrag, 0);
    html += `
    <div class="card">
      <div class="card-header">
        <span class="card-title">${lid.emoji} ${lid.naam}</span>
        <span class="badge badge-mint">${formatEuro(totaal)} totaal</span>
      </div>
      ${items.map(item => `
      <div class="payment-row">
        <div>
          <div class="payment-who">${item.notitie || `${item.maanden} maand${item.maanden > 1 ? 'en' : ''}`}</div>
          <div class="payment-date">${formatDatum(item.datum)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="payment-amount">${formatEuro(item.bedrag)}</span>
          <button class="delete-btn admin-only" onclick="deleteInleg(${item.id})">🗑</button>
        </div>
      </div>`).join('')}
    </div>`;
  }
  el.innerHTML = html;
}

function renderDeclaraties() {
  const el = document.getElementById('decl-list');
  if (!state.declaraties.length) {
    el.innerHTML = emptyState('🧾', 'Nog geen declaraties');
    return;
  }
  const openDecl = state.declaraties.filter(d => !d.uitbetaald);
  const betaald = state.declaraties.filter(d => d.uitbetaald);

  let html = '';
  if (openDecl.length) {
    html += `<div style="font-weight:800;color:#FF6B6B;margin-bottom:8px;font-size:0.85rem">⏳ OPENSTAAND</div>`;
    html += openDecl.map(d => declCard(d)).join('');
  }
  if (betaald.length) {
    html += `<div style="font-weight:800;color:#6BCB77;margin:12px 0 8px;font-size:0.85rem">✅ UITBETAALD</div>`;
    html += betaald.map(d => declCard(d)).join('');
  }
  el.innerHTML = html;
}

function declCard(d) {
  const lid = getLid(d.ledId);
  if (!lid) return '';
  return `
  <div class="card">
    <div class="decl-top">
      <div>
        <div class="decl-name">${lid.emoji} ${lid.naam}</div>
        <div class="decl-what">${d.wat}</div>
        <div class="payment-date">${formatDatum(d.datum)}</div>
      </div>
      <div class="decl-right">
        <div class="decl-amount">${formatEuro(d.bedrag)}</div>
        ${d.uitbetaald
          ? `<div class="decl-status paid-out">✅ ${formatDatum(d.uitbetaaldDatum)}</div>`
          : `<div class="decl-status pending">⏳ Openstaand</div>`}
        <div style="margin-top:6px;display:flex;gap:4px;justify-content:flex-end">
          ${state.isAdmin ? `
            <button class="paid-toggle ${d.uitbetaald ? 'paid-btn' : 'pending-btn'}" onclick="toggleUitbetaald(${d.id})">
              ${d.uitbetaald ? '↩ Terugdraaien' : '✓ Uitbetalen'}
            </button>
            <button class="delete-btn" onclick="deleteDecl(${d.id})">🗑</button>
          ` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

function emptyState(emoji, tekst) {
  return `<div class="empty-state"><span class="emoji">${emoji}</span><p>${tekst}</p></div>`;
}

// ==================== TABS ====================
function showTab(tab) {
  state.activeTab = tab;
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
}

// ==================== ADMIN ====================
let pinBuffer = '';

function openPinModal() {
  if (state.isAdmin) { logoutAdmin(); return; }
  pinBuffer = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pinModal').classList.add('open');
}

function closePinModal() {
  document.getElementById('pinModal').classList.remove('open');
}

function pinPress(k) {
  if (k === 'del') { pinBuffer = pinBuffer.slice(0, -1); updatePinDots(); return; }
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  if (pinBuffer.length === 4) {
    setTimeout(() => {
      if (pinBuffer === ADMIN_PIN) {
        state.isAdmin = true;
        document.body.classList.add('admin-mode');
        document.getElementById('adminToggleBtn').textContent = 'Uitloggen';
        document.getElementById('adminToggleBtn').classList.remove('off');
        closePinModal();
        render();
      } else {
        document.getElementById('pin-error').textContent = '❌ Onjuiste PIN, probeer opnieuw';
        pinBuffer = '';
        updatePinDots();
      }
    }, 200);
  }
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
  }
}

function logoutAdmin() {
  state.isAdmin = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('adminToggleBtn').textContent = 'Inloggen';
  document.getElementById('adminToggleBtn').classList.add('off');
  render();
}

// ==================== ADD MODAL ====================
function openAddModal() {
  const tab = state.activeTab;
  document.getElementById('addModal').classList.add('open');
  if (tab === 'leden') showAddLidForm();
  else if (tab === 'inleg') showAddInlegForm();
  else showAddDeclForm();
}

function openBeginSaldoModal() {
  document.getElementById('modal-title').textContent = '🏦 Beginsaldo instellen';
  document.getElementById('modal-body').innerHTML = `
    <div style="background:#FFF8EE;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:0.85rem;color:#888;font-weight:600">
      Vul hier het bedrag in dat er al in kas was vóór je deze app ging gebruiken.
    </div>
    <div class="form-group"><label>Beginsaldo (€)</label>
      <input id="f-beginsaldo" type="number" min="0" step="0.01" placeholder="bijv. 150" value="${state.beginSaldo}">
    </div>
    <button class="btn-primary" onclick="saveBeginSaldo()">✅ Opslaan</button>
    <button class="btn-secondary" onclick="closeAddModal()">Annuleren</button>
  `;
  document.getElementById('addModal').classList.add('open');
}

function saveBeginSaldo() {
  const val = parseFloat(document.getElementById('f-beginsaldo').value);
  if (isNaN(val) || val < 0) return alert('Vul een geldig bedrag in');
  state.beginSaldo = val;
  closeAddModal();
  render();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

function ledenOptions() {
  return state.leden.map(l => `<option value="${l.id}">${l.emoji} ${l.naam}</option>`).join('');
}

function showAddLidForm() {
  document.getElementById('modal-title').textContent = '👤 Familielid toevoegen';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label>Naam</label><input id="f-naam" placeholder="bijv. Oma Riet"></div>
    <div class="form-group"><label>Geboortedatum</label><input id="f-gebdat" type="date" max="${new Date().toISOString().slice(0,10)}"></div>
    <div class="form-group"><label>Emoji</label>
      <select id="f-emoji">${AVATARS.map(e => `<option>${e}</option>`).join('')}</select>
    </div>
    <div id="f-preview" style="background:#F7F0FF;border-radius:12px;padding:10px 14px;margin-bottom:4px;font-size:0.85rem;font-weight:700;color:#7B2FBE;display:none"></div>
    <button class="btn-primary" onclick="saveLid()">✅ Toevoegen</button>
    <button class="btn-secondary" onclick="closeAddModal()">Annuleren</button>
  `;
  document.getElementById('f-gebdat').addEventListener('change', function() {
    const preview = document.getElementById('f-preview');
    const leeftijd = berekenLeeftijd(this.value);
    const bijdr = maandBijdrage(this.value);
    const catDatum = volgendeCategorieDatum(this.value);
    let tekst = `🎂 ${leeftijd} jaar · bijdrage: ${bijdr === 0 ? 'Gratis' : '€' + bijdr + '/mnd'}`;
    if (catDatum) tekst += ` · tarief ↑ op ${formatDatum(catDatum.toISOString().slice(0,10))}`;
    preview.textContent = tekst;
    preview.style.display = 'block';
  });
}

function showAddInlegForm() {
  document.getElementById('modal-title').textContent = '💰 Inleg registreren';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label>Familielid</label><select id="f-lid">${ledenOptions()}</select></div>
    <div class="form-group"><label>Bedrag (€)</label><input id="f-bedrag" type="number" min="1" placeholder="bijv. 16"></div>
    <div class="form-group"><label>Datum</label><input id="f-datum" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="form-group"><label>Aantal maanden</label><input id="f-maanden" type="number" min="1" placeholder="bijv. 4"></div>
    <div class="form-group"><label>Notitie (optioneel)</label><input id="f-notitie" placeholder="bijv. Jan t/m april"></div>
    <button class="btn-primary" onclick="saveInleg()">✅ Registreren</button>
    <button class="btn-secondary" onclick="closeAddModal()">Annuleren</button>
  `;
}

function showAddDeclForm() {
  document.getElementById('modal-title').textContent = '🧾 Declaratie toevoegen';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label>Familielid</label><select id="f-lid">${ledenOptions()}</select></div>
    <div class="form-group"><label>Wat is er betaald?</label><input id="f-wat" placeholder="bijv. Huur bowlingbaan"></div>
    <div class="form-group"><label>Bedrag (€)</label><input id="f-bedrag" type="number" min="1" placeholder="bijv. 85"></div>
    <div class="form-group"><label>Datum betaald</label><input id="f-datum" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <button class="btn-primary" onclick="saveDecl()">✅ Toevoegen</button>
    <button class="btn-secondary" onclick="closeAddModal()">Annuleren</button>
  `;
}

// ==================== SAVES ====================
function saveLid() {
  const naam = document.getElementById('f-naam').value.trim();
  const geboortedatum = document.getElementById('f-gebdat').value;
  const emoji = document.getElementById('f-emoji').value;
  if (!naam || !geboortedatum) return alert('Vul naam en geboortedatum in!');
  state.leden.push({ id: state.nextId++, naam, geboortedatum, emoji });
  closeAddModal(); render();
}

function saveInleg() {
  const ledId = parseInt(document.getElementById('f-lid').value);
  const bedrag = parseFloat(document.getElementById('f-bedrag').value);
  const datum = document.getElementById('f-datum').value;
  const maanden = parseInt(document.getElementById('f-maanden').value) || 1;
  const notitie = document.getElementById('f-notitie').value.trim();
  if (!bedrag || !datum) return alert('Vul bedrag en datum in!');
  state.inleg.push({ id: state.nextId++, ledId, bedrag, datum, maanden, notitie });
  closeAddModal(); render();
}

function saveDecl() {
  const ledId = parseInt(document.getElementById('f-lid').value);
  const wat = document.getElementById('f-wat').value.trim();
  const bedrag = parseFloat(document.getElementById('f-bedrag').value);
  const datum = document.getElementById('f-datum').value;
  if (!wat || !bedrag || !datum) return alert('Vul alle velden in!');
  state.declaraties.push({ id: state.nextId++, ledId, wat, bedrag, datum, uitbetaald: false, uitbetaaldDatum: null });
  closeAddModal(); render();
}

// ==================== DELETES ====================
function deleteLid(id) {
  if (!confirm('Familielid verwijderen?')) return;
  state.leden = state.leden.filter(l => l.id !== id);
  state.inleg = state.inleg.filter(i => i.ledId !== id);
  state.declaraties = state.declaraties.filter(d => d.ledId !== id);
  render();
}
function deleteInleg(id) {
  if (!confirm('Inleg verwijderen?')) return;
  state.inleg = state.inleg.filter(i => i.id !== id);
  render();
}
function deleteDecl(id) {
  if (!confirm('Declaratie verwijderen?')) return;
  state.declaraties = state.declaraties.filter(d => d.id !== id);
  render();
}

function toggleUitbetaald(id) {
  const d = state.declaraties.find(x => x.id === id);
  if (!d) return;
  d.uitbetaald = !d.uitbetaald;
  d.uitbetaaldDatum = d.uitbetaald ? new Date().toISOString().slice(0, 10) : null;
  render();
}

// Close modal on overlay click
document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});
document.getElementById('pinModal').addEventListener('click', function(e) {
  if (e.target === this) closePinModal();
});

// ==================== OPSLAG (gedeeld via Claude, anders localStorage) ====================
const STORAGE_KEY = 'familiedag_kas_v1';
let isLoading = false;

function heeftClaudeOpslag() {
  return typeof window.storage !== 'undefined' && window.storage !== null;
}

function laadUitLocalStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.leden))       state.leden       = data.leden;
    if (Array.isArray(data.inleg))       state.inleg       = data.inleg;
    if (Array.isArray(data.declaraties)) state.declaraties = data.declaraties;
    if (data.beginSaldo !== undefined)   state.beginSaldo  = data.beginSaldo;
    if (data.nextId !== undefined)       state.nextId      = data.nextId;
  } catch(e) { console.warn('localStorage laden mislukt:', e); }
}

function slaOpInLocalStorage(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) { console.warn('localStorage opslaan mislukt:', e); }
}

async function slaOp() {
  const data = {
    leden: state.leden,
    inleg: state.inleg,
    declaraties: state.declaraties,
    beginSaldo: state.beginSaldo,
    nextId: state.nextId,
  };
  if (heeftClaudeOpslag()) {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(data), true);
      slaOpInLocalStorage(data); // ook lokaal als backup
    } catch(e) {
      console.warn('Claude opslag mislukt, val terug op localStorage:', e);
      slaOpInLocalStorage(data);
    }
  } else {
    slaOpInLocalStorage(data);
  }
}

async function laadOp() {
  isLoading = true;
  toonLaadscherm(true);

  function verwerkData(data) {
    // Volledig vervangen, nooit samenvoegen
    if (Array.isArray(data.leden))       state.leden       = data.leden;
    if (Array.isArray(data.inleg))       state.inleg       = data.inleg;
    if (Array.isArray(data.declaraties)) state.declaraties = data.declaraties;
    if (data.beginSaldo !== undefined)   state.beginSaldo  = data.beginSaldo;
    if (data.nextId !== undefined)       state.nextId      = data.nextId;
  }

  if (heeftClaudeOpslag()) {
    try {
      const result = await window.storage.get(STORAGE_KEY, true);
      if (result && result.value) {
        verwerkData(JSON.parse(result.value));
      } else {
        laadUitLocalStorage();
      }
    } catch(e) {
      console.warn('Claude opslag laden mislukt, val terug op localStorage:', e);
      laadUitLocalStorage();
    }
  } else {
    laadUitLocalStorage();
  }

  isLoading = false;
  toonLaadscherm(false);
  renderAlles();
}

function toonLaadscherm(toon) {
  let el = document.getElementById('laadscherm');
  if (!el) {
    el = document.createElement('div');
    el.id = 'laadscherm';
    el.style.cssText = 'position:fixed;inset:0;background:var(--cream);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px';
    el.innerHTML = '<div style="font-size:3rem">🎉</div><div style="font-family:Fredoka One,cursive;font-size:1.3rem;color:var(--coral)">Even laden...</div>';
    document.body.appendChild(el);
  }
  el.style.display = toon ? 'flex' : 'none';
}

// render slaat altijd op — al geregeld in de render() functie hierboven

async function ververs() {
  const btn = document.getElementById('verversBtn');
  btn.textContent = '⏳ Laden...';
  btn.disabled = true;
  state.leden = []; state.inleg = []; state.declaraties = []; state.beginSaldo = 0;
  await laadOp();
  btn.textContent = '✅ Bijgewerkt!';
  setTimeout(() => { btn.textContent = '🔄 Verversen'; btn.disabled = false; }, 1500);
}

// Init: laad gedeelde data, dan render
laadOp();
</script>
